server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # All routes fall back to index.html for SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gzip for JS/CSS assets
    gzip on;
    gzip_types text/plain application/javascript text/css application/json;
    gzip_min_length 256;
}
