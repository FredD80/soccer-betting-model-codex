apiVersion: apps/v1
kind: Deployment
metadata:
  name: sbm-worker
  namespace: tenant-d
  labels:
    app: sbm-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sbm-worker
  template:
    metadata:
      labels:
        app: sbm-worker
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: worker
          image: ghcr.io/fredd80/sbm-engine:${IMAGE_TAG}
          command:
            - celery
            - -A
            - app.celery_app
            - worker
            - --loglevel=info
            - --concurrency=$(CELERY_CONCURRENCY)
            - --queues=$(CELERY_QUEUES)
          envFrom:
            - secretRef:
                name: sbm-secrets
            - configMapRef:
                name: sbm-config
            - configMapRef:
                name: sbm-worker-config
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
