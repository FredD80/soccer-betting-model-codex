apiVersion: apps/v1
kind: Deployment
metadata:
  name: sbm-api
  namespace: tenant-d
  labels:
    app: sbm-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sbm-api
  template:
    metadata:
      labels:
        app: sbm-api
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: api
          image: ghcr.io/fredd80/sbm-api:${IMAGE_TAG}
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: sbm-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
