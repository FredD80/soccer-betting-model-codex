apiVersion: apps/v1
kind: Deployment
metadata:
  name: sbm-dashboard
  namespace: tenant-d
  labels:
    app: sbm-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sbm-dashboard
  template:
    metadata:
      labels:
        app: sbm-dashboard
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: dashboard
          image: ghcr.io/fredd80/sbm-dashboard:${IMAGE_TAG}
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "32Mi"
              cpu: "25m"
            limits:
              memory: "64Mi"
              cpu: "100m"
